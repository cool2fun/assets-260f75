<!DOCTYPE html>
<html lang="en-us" class="no-js">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>Angry Sharks</title>

    <!--
      ============================================================
      CDN CONFIG — chỉ cần sửa DÒNG DUY NHẤT bên dưới.
      - Để trống ("")  -> nạp file theo đường dẫn tương đối (test local).
      - Khi có CDN     -> điền URL gốc, PHẢI kết thúc bằng "/".
        Ví dụ (jsDelivr + GitHub):
          https://cdn.jsdelivr.net/gh/USERNAME/REPO@main/
      Biến này điều khiển cả 3 thứ:
        1) <base>  -> css / favicon / ảnh resolve về CDN
        2) src của js/game.js (nạp khi bấm Play)
        3) Phaser load.baseURL trong game.js (assets / audio / data)
      => Đưa index.html này lên Google Apps Script webapp, các file
         còn lại lên GitHub->CDN, rồi điền CDN_BASE là chạy.
      ============================================================
    -->
    <script>
      window.CDN_BASE = "";
      if (window.CDN_BASE) {
        // Mọi URL tương đối (css, favicon, ảnh, và asset của Phaser)
        // sẽ resolve về CDN thay vì host của Apps Script.
        document.write('<base href="' + window.CDN_BASE + '">');
      }
    </script>

    <link rel="stylesheet" href="css/normalize.css" />
    <link rel="stylesheet" href="css/game.css" />

    <link rel="icon" type="image/png" href="assets/favicon/icon-36x36.png" sizes="36x36" />
    <link rel="icon" type="image/png" href="assets/favicon/icon-512x512.png" sizes="512x512" />
    <link rel="apple-touch-icon" type="image/png" href="assets/favicon/icon-36x36.png" sizes="36x36" />
    <link rel="apple-touch-icon" type="image/png" href="assets/favicon/icon-512x512.png" sizes="512x512" />

    <style>
      :root {
        --border: #232838; --text: #e8ebf2; --muted: #8b93a7;
        --accent: #22d3ee; --accent-2: #06b6d4; --radius: 14px;
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; height: 100%; overflow: hidden; background: #000; }
      body { display: flex; color: var(--text); font-family: system-ui, -apple-system, sans-serif; }
      .player { flex: 1; display: flex; min-height: 0; }
      .frame { display: flex; flex-direction: column; width: 100%; height: 100%; }
      .stage { position: relative; flex: 1; min-height: 0; background: #000; overflow: hidden; }

      /* Overlay Click-to-Play (đè lên canvas Phaser cho tới khi bấm) */
      .overlay { position: fixed; inset: 0; z-index: 2147483000; display: flex; align-items: center; justify-content: center;
        background: radial-gradient(600px 300px at 50% 50%, #0d1622 0%, #000 70%); }
      .start-btn { display: inline-flex; align-items: center; gap: 12px; padding: 16px 34px; font: 700 1.05rem system-ui, sans-serif;
        letter-spacing: 0.08em; color: #fff; text-transform: uppercase; background: linear-gradient(137deg, #cb8317, #9f2121);
        border: none; border-radius: 86px; cursor: pointer; box-shadow: 0 10px 30px -8px #3c5685;
        transition: transform .18s ease, filter .18s ease; }
      .start-btn:hover { transform: translateY(-2px); filter: brightness(1.08); }
      .start-btn svg { width: 20px; height: 20px; }

      /* Thanh loading (indeterminate) trong lúc nạp game.js */
      .status { position: fixed; inset: 0; z-index: 2147482000; display: none; flex-direction: column;
        align-items: center; justify-content: center; gap: 14px; color: var(--muted); font-size: .95rem;
        letter-spacing: .05em; background: #000; }
      .status.show { display: flex; }
      .bar { width: min(58%, 320px); height: 8px; background: #1b2030; border-radius: 99px; overflow: hidden; }
      .bar > i { display: block; height: 100%; width: 0; background: linear-gradient(90deg, #cb8317, #df3e17); transition: width .15s ease; }
      .bar.indeterminate > i { width: 40%; animation: slide 1.1s ease-in-out infinite; }
      @keyframes slide { 0% { margin-left: -40%; } 100% { margin-left: 100%; } }

      /* Nút Fullscreen nổi trên game (canvas Phaser luôn fixed fullscreen) */
      .controls { position: fixed; right: 12px; bottom: 12px; z-index: 2147483100;
        display: flex; align-items: center; gap: 10px; }
      .ctrl { display: inline-flex; align-items: center; gap: 8px; padding: 10px 18px; font: 600 .9rem system-ui, sans-serif;
        letter-spacing: .04em; color: var(--text); background: rgba(10,14,22,.72); backdrop-filter: blur(4px);
        border: 1px solid var(--border); border-radius: 10px; cursor: pointer;
        transition: background .16s ease, border-color .16s ease, color .16s ease; }
      .ctrl:hover { background: #1b2030; border-color: var(--accent-2); color: #fff; }
      .ctrl:disabled { opacity: .4; cursor: not-allowed; }
      .ctrl svg { width: 18px; height: 18px; }
      .ctrl--primary { color: #df3e17; border-color: #df3e17; }
      .ctrl--primary:hover { background: rgba(223,62,23,0.12); border-color: #df3e17; color: #ff6a45; }

      /* Fullscreen API thật + fallback khi bị chặn (vd: iframe Apps Script) */
      .player:fullscreen { background: #000; }
      .player.expanded { position: fixed; inset: 0; z-index: 2147483646; background: #000; }
    </style>
  </head>

  <body style="background-color:#000;">
    <div class="player" id="player">
      <div class="frame">
        <div class="stage" id="stage">
          <!-- Phaser tự tạo <canvas id="gameCanvas"> và append vào body -->

          <!-- Cảnh báo xoay màn hình — game.js BẮT BUỘC cần id này -->
          <div id="wrongRotation">
            <img src="assets/img/rotate_screen.png" alt="" />
          </div>

          <div class="status" id="status">
            <div class="bar indeterminate" id="bar"><i id="bar-fill"></i></div>
            <span id="status-text">Loading…</span>
          </div>

          <div class="overlay" id="overlay">
            <button class="start-btn" type="button" id="start-btn">
              <svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg> Click to Play
            </button>
          </div>
        </div>

        <div class="controls">
          <button class="ctrl ctrl--primary" type="button" id="fs-btn" title="Fullscreen" disabled>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3M3 16v3a2 2 0 0 0 2 2h3m13-5v3a2 2 0 0 1-2 2h-3"/></svg>
            <span>Fullscreen</span>
          </button>
        </div>
      </div>
    </div>

    <!-- Preload font (giữ từ bản gốc để đo chữ đúng) -->
    <div class="font_preload" style="opacity:0;"><span style="font-family:'gameFont','Arial',normal;"></span></div>
    <div class="font_preload" style="opacity:0;"><span style="font-family:'gameFont2','Arial',normal;"></span></div>

    <!-- game.js cần id "ads" -->
    <div id="ads"></div>

    <script>
      (function () {
        var CDN_BASE = window.CDN_BASE || "";
        var player    = document.getElementById("player");
        var overlay   = document.getElementById("overlay");
        var statusEl  = document.getElementById("status");
        var statusTxt = document.getElementById("status-text");
        var bar       = document.getElementById("bar");
        var startBtn  = document.getElementById("start-btn");
        var fsBtn     = document.getElementById("fs-btn");
        var booted = false, pollTimer = 0, safetyTimer = 0;

        function setStatus(t) { statusTxt.textContent = t; }

        startBtn.addEventListener("click", start);
        fsBtn.addEventListener("click", toggleFullscreen);

        function start() {
          if (booted) return;
          booted = true;
          overlay.style.display = "none";
          statusEl.classList.add("show");
          bar.classList.add("indeterminate");
          setStatus("Loading…");
          fsBtn.disabled = false;

          // Nạp engine + game khi người dùng bấm Play.
          var s = document.createElement("script");
          s.src = (CDN_BASE ? CDN_BASE : "") + "js/game.js";
          s.onerror = function () {
            bar.classList.remove("indeterminate");
            setStatus("Load error: không tải được js/game.js" + (CDN_BASE ? " từ CDN" : ""));
          };
          document.body.appendChild(s);

          // Chờ Phaser tạo <canvas id="gameCanvas"> rồi nhường màn hình
          // cho preloader riêng của game.
          pollTimer = setInterval(function () {
            if (document.getElementById("gameCanvas")) {
              clearInterval(pollTimer);
              setTimeout(hideStatus, 800);
            }
          }, 150);
          // Lưới an toàn: không để status che canvas mãi.
          safetyTimer = setTimeout(hideStatus, 45000);
        }

        function hideStatus() {
          clearInterval(pollTimer);
          clearTimeout(safetyTimer);
          statusEl.classList.remove("show");
        }

        // Fullscreen: ưu tiên Fullscreen API thật trên cả trang (canvas Phaser
        // fixed + append vào <body>, nên phải fullscreen documentElement mới bao
        // hết). Nếu bị chặn (vd: iframe Apps Script) thì fallback sang lớp
        // "expanded" position:fixed — giống demo.
        function toggleFullscreen() {
          if (player.classList.contains("expanded")) { setExpand(false); return; }
          if (document.fullscreenElement) { document.exitFullscreen(); return; }
          var el = document.documentElement;
          var req = el.requestFullscreen || el.webkitRequestFullscreen || el.msRequestFullscreen;
          if (document.fullscreenEnabled && req) {
            var p = req.call(el);
            if (p && p.catch) p.catch(function () { setExpand(true); });
          } else {
            setExpand(true);
          }
        }
        function setExpand(on) {
          player.classList.toggle("expanded", on);
          fsBtn.querySelector("span").textContent = on ? "Exit Fullscreen" : "Fullscreen";
        }
        function syncFsLabel() {
          var on = !!document.fullscreenElement;
          fsBtn.querySelector("span").textContent = on ? "Exit Fullscreen" : "Fullscreen";
        }
        document.addEventListener("fullscreenchange", syncFsLabel);
        document.addEventListener("webkitfullscreenchange", syncFsLabel);
        document.addEventListener("keydown", function (e) {
          if (e.key === "Escape" && player.classList.contains("expanded")) setExpand(false);
        });
      })();
    </script>
  </body>
</html>
